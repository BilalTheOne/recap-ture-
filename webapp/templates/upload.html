{% extends "base.html" %}
{% block title %}Upload — Recap-ture{% endblock %}
{% block content %}
<div class="card">
  <h1>Process a recording</h1>
  <p class="muted">Upload a recording to detect speakers, identify known voices, and produce a labeled transcript.</p>
  <form action="/jobs" method="post" enctype="multipart/form-data">
    <label>Recording (mp4 / wav / m4a / mp3)</label>
    <input type="file" name="recording" required>

    <label>Existing transcript (optional — vtt/txt/json/docx; auto-transcribed with Whisper if omitted)</label>
    <input type="file" name="transcript">

    <label>Known number of speakers (recommended — leave blank to estimate, which is unreliable)</label>
    <input type="number" name="speakers" min="1">

    <div class="checkbox-row">
      <input type="checkbox" id="use_voiceprints" name="use_voiceprints" value="true" checked>
      <label for="use_voiceprints" style="margin:0;">Identify speakers using voice biometrics</label>
    </div>

    <label>Whisper model (only used if no transcript is uploaded)</label>
    <select name="whisper_model">
      <option value="tiny">tiny (fastest, lowest accuracy)</option>
      <option value="base" selected>base</option>
      <option value="small">small</option>
      <option value="medium">medium</option>
      <option value="large-v3">large-v3 (slowest, highest accuracy)</option>
    </select>

    <button type="submit">Process recording</button>
  </form>
</div>
{% endblock %}
